<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Noteflix Editor — Full Toolbar + Popups + Paste</title>

  <!-- Icons & Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Open+Sans&family=Lora&family=Inconsolata&display=swap" rel="stylesheet">

  <style>
    :root {
      --br: 10px;
      --bd: #d0d7de;
      --bg: #f8f9fb;
      --bg-hover: #eef1f5;
      --shadow: 0 8px 24px rgba(140,149,159,.2);
    }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 20px; }
    h2 { margin: 0 0 14px; }

    /* Toolbar */
    #toolbar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 10px; }
    #toolbar button {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border: 1px solid var(--bd); border-radius: 8px;
      background: var(--bg); cursor: pointer; transition: .15s background; font-size: 16px;
    }
    #toolbar button:hover { background: var(--bg-hover); }
    #toolbar select { height: 36px; border: 1px solid var(--bd); border-radius: 6px; padding: 0 6px; }
    #font-controls { display: inline-flex; align-items: center; gap: 6px; margin-left: 4px; }
    #font-size-label { min-width: 42px; text-align: center; font-variant-numeric: tabular-nums; }

    /* Editor */
    .ProseMirror {
      min-height: 260px; outline: none;
    }
    .ProseMirror p { margin: 8px 0; }
    
    /* Placeholder styles */
    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      float: left;
      color: #a0aec0;
      pointer-events: none;
      height: 0;
    }
    
    /* Blockquote styling */
    .ProseMirror blockquote {
      margin: 16px 0;
      color: #666;
      font-style: italic;
      background: #f9f9f9;
      padding: 12px 16px;
      border-radius: 4px;
    }
    
    /* Left blockquote (default) */
    .ProseMirror blockquote:not([data-type="right"]) {
      border-left: 4px solid #ddd;
    }
    
    /* Right blockquote */
    .ProseMirror blockquote[data-type="right"] {
      border-right: 4px solid #ddd;
      text-align: right;
    }

    /* Code block styling */
    .ProseMirror pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      color: #333;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.5;
      margin: 16px 0;
      overflow-x: auto;
      padding: 16px;
      white-space: pre-wrap;
    }
    
    .ProseMirror code {
      background: #f0f0f0;
      border-radius: 3px;
      color: #d63384;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9em;
      padding: 2px 4px;
    }

    /* Task list styling */
    ul[data-type="taskList"] { list-style: none; padding-left: 0; margin: 0; }
    ul[data-type="taskList"] li { display: flex; align-items: center; margin: 6px 0; }
    ul[data-type="taskList"] li > label { display: flex; align-items: center; gap: 8px; width: auto; }
    ul[data-type="taskList"] li > label > div { display: inline-block; }
    ul[data-type="taskList"] li[data-checked="true"] > label > div { text-decoration: line-through; color: #666; }

    /* Popups */
    .popup {
      position: absolute; background: #fff; border: 1px solid var(--bd); border-radius: var(--br);
      padding: 8px; box-shadow: var(--shadow);
      z-index: 1000; opacity: 0; transform: translateY(-8px) scale(.96);
      transition: opacity .22s ease, transform .22s ease; pointer-events: none;
    }
    .popup.d-flex { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; display: flex !important; gap: 6px; }
    .d-none { display: none; }

    .popup button {
      width: 32px; height: 32px; border: 1px solid var(--bd); border-radius: 25px;
      background: var(--bg); cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    }
    .popup button:hover { background: var(--bg-hover); }

    /* Color popups */
    .color-popup { flex-direction: column; gap: 8px; }
    .color-popup .header {
      width: 100%; font-weight: 700; font-size: 18px;
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;
    }
    .color-popup .clear-btn {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 25px; height: 32px; width: 32px; background: #f0f2f5;
      border: 1px solid var(--bd); font-size: 16px; padding: 0;
    }
    .palette { display: grid; grid-template-columns: repeat(7, 30px); gap: 8px; }
    .swatch {
      width: 26px; height: 26px; border-radius: 50%; border: 1px solid #c8ced6;
      cursor: pointer; padding: 0; background: transparent;
    }

    /* Title section */
    #title-section {
      margin: 0;
    }
    #note-title {
      width: 100%;
      border: none;
      outline: none;
      font-size: 28px;
      font-weight: 600;
      color: #2d3748;
      background: transparent;
      padding: 10px 0;
    }
    #note-title::placeholder {
      color: #718096;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <h2>Noteflix Editor — Full Toolbar + Popups + Paste</h2>

  <div id="toolbar">
    <!-- basic -->
    <button id="bold-btn" title="Bold"><i class="bi bi-type-bold"></i></button>
    <button id="italic-btn" title="Italic"><i class="bi bi-type-italic"></i></button>
    <button id="underline-btn" title="Underline"><i class="bi bi-type-underline"></i></button>
    <button id="strike-btn" title="Strike"><i class="bi bi-type-strikethrough"></i></button>
    <button id="subscript-btn" title="Subscript"><i class="bi bi-subscript"></i></button>
    <button id="superscript-btn" title="Superscript"><i class="bi bi-superscript"></i></button>

    <!-- headings -->
    <button id="heading-btn" title="Headings"><i class="bi bi-h-square-fill"></i></button>

    <!-- lists -->
    <button id="list-btn" title="Lists"><i class="bi bi-list"></i></button>

    <!-- colors -->
    <button id="palette-btn" title="Colors"><i class="bi bi-palette"></i></button>

    <!-- others -->
    <button id="blockquote-btn" title="Blockquote">❝</button>
    <button id="codeblock-btn" title="Code">{ }</button>
    <button id="hr-btn" title="Horizontal Rule">―</button>
    <button id="undo-btn" title="Undo">↺</button>
    <button id="redo-btn" title="Redo">↻</button>

    <!-- font family -->
    <select id="font-family-select" title="Font Family">
      <option value="sans-serif" selected>Sans-serif</option>
      <option value="serif">Serif</option>
      <option value="monospace">Monospace</option>
      <option value="Roboto, sans-serif">Roboto</option>
      <option value="'Open Sans', sans-serif">Open Sans</option>
      <option value="Lora, serif">Lora</option>
      <option value="Inconsolata, monospace">Inconsolata</option>
    </select>

    <!-- font size -->
    <span id="font-controls">
      <button id="font-dec" title="Font -">–</button>
      <span id="font-size-label">14px</span>
      <button id="font-inc" title="Font +">+</button>
    </span>
  </div>

  <!-- Title section -->
  <div id="title-section">
    <input type="text" id="note-title" placeholder="Note title" />
  </div>

  <div id="editor"></div>

  <!-- Heading popup -->
  <div id="heading-popup" class="popup d-none">
    <button data-level="1" title="H1"><i class="bi bi-type-h1"></i></button>
    <button data-level="2" title="H2"><i class="bi bi-type-h2"></i></button>
    <button data-level="3" title="H3"><i class="bi bi-type-h3"></i></button>
    <button data-level="4" title="H4"><i class="bi bi-type-h4"></i></button>
    <button data-level="5" title="H5"><i class="bi bi-type-h5"></i></button>
    <button data-level="6" title="H6"><i class="bi bi-type-h6"></i></button>
  </div>

  <!-- Blockquote popup -->
  <div id="blockquote-popup" class="popup d-none">
    <button data-type="left" title="Left Blockquote"><i class="bi bi-blockquote-left"></i></button>
    <button data-type="right" title="Right Blockquote"><i class="bi bi-blockquote-right"></i></button>
  </div>

  <!-- List popup -->
  <div id="list-popup" class="popup d-none">
    <button data-action="bullet" title="Bulleted"><i class="bi bi-list-ul"></i></button>
    <button data-action="ordered" title="Numbered"><i class="bi bi-list-ol"></i></button>
    <button data-action="task" title="Task"><i class="bi bi-list-task"></i></button>
  </div>

  <!-- Palette selector -->
  <div id="palette-popup" class="popup d-none">
    <button id="textcolor-btn" title="Text color"><i class="bi bi-alphabet-uppercase"></i></button>
    <button id="bgcolor-btn" title="Background color"><i class="bi bi-back"></i></button>
  </div>

  <!-- Text Color popup -->
  <div id="text-popup" class="popup color-popup d-none">
    <div class="header"><span>Text Color</span><button id="text-clear" class="clear-btn" title="Clear"><i class="bi bi-eraser-fill"></i></button></div>
    <div class="palette">
      <button class="swatch" data-color="#e91e63" style="background:#e91e63"></button>
      <button class="swatch" data-color="#9c27b0" style="background:#9c27b0"></button>
      <button class="swatch" data-color="#673ab7" style="background:#673ab7"></button>
      <button class="swatch" data-color="#3f51b5" style="background:#3f51b5"></button>
      <button class="swatch" data-color="#2196f3" style="background:#2196f3"></button>
      <button class="swatch" data-color="#03a9f4" style="background:#03a9f4"></button>
      <button class="swatch" data-color="#00bcd4" style="background:#00bcd4"></button>
      <button class="swatch" data-color="#009688" style="background:#009688"></button>
      <button class="swatch" data-color="#4caf50" style="background:#4caf50"></button>
      <button class="swatch" data-color="#8bc34a" style="background:#8bc34a"></button>
      <button class="swatch" data-color="#cddc39" style="background:#cddc39"></button>
      <button class="swatch" data-color="#ffc107" style="background:#ffc107"></button>
      <button class="swatch" data-color="#ff5722" style="background:#ff5722"></button>
      <button class="swatch" data-color="#f44336" style="background:#f44336"></button>
    </div>
  </div>

  <!-- Background Color popup -->
  <div id="bg-popup" class="popup color-popup d-none">
    <div class="header"><span>Background Color</span><button id="bg-clear" class="clear-btn" title="Clear"><i class="bi bi-eraser-fill"></i></button></div>
    <div class="palette">
      <button class="swatch" data-color="#b0bec5" style="background:#b0bec5"></button>
      <button class="swatch" data-color="#a1887f" style="background:#a1887f"></button>
      <button class="swatch" data-color="#9575cd" style="background:#9575cd"></button>
      <button class="swatch" data-color="#7986cb" style="background:#7986cb"></button>
      <button class="swatch" data-color="#64b5f6" style="background:#64b5f6"></button>
      <button class="swatch" data-color="#4fc3f7" style="background:#4fc3f7"></button>
      <button class="swatch" data-color="#4dd0e1" style="background:#4dd0e1"></button>
      <button class="swatch" data-color="#4db6ac" style="background:#4db6ac"></button>
      <button class="swatch" data-color="#81c784" style="background:#81c784"></button>
      <button class="swatch" data-color="#aed581" style="background:#aed581"></button>
      <button class="swatch" data-color="#dce775" style="background:#dce775"></button>
      <button class="swatch" data-color="#fff176" style="background:#fff176"></button>
      <button class="swatch" data-color="#ffd54f" style="background:#ffd54f"></button>
      <button class="swatch" data-color="#e57373" style="background:#e57373"></button>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "@tiptap/core": "https://esm.sh/@tiptap/core@2.1.13",
        "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@2.1.13",
        "@tiptap/extension-task-list": "https://esm.sh/@tiptap/extension-task-list@2.1.13",
        "@tiptap/extension-task-item": "https://esm.sh/@tiptap/extension-task-item@2.1.13",
        "@tiptap/extension-text-style": "https://esm.sh/@tiptap/extension-text-style@2.1.13",
        "@tiptap/extension-color": "https://esm.sh/@tiptap/extension-color@2.1.13",
        "@tiptap/extension-highlight": "https://esm.sh/@tiptap/extension-highlight@2.1.13",
        "@tiptap/extension-subscript": "https://esm.sh/@tiptap/extension-subscript@2.1.13",
        "@tiptap/extension-superscript": "https://esm.sh/@tiptap/extension-superscript@2.1.13",
        "@tiptap/extension-placeholder": "https://esm.sh/@tiptap/extension-placeholder@2.1.13"
      }
    }
  </script>
  <script type="module">
    /* ---------- Imports ---------- */
    import { Editor, Extension } from "@tiptap/core";
    import StarterKit from "@tiptap/starter-kit";
    import TaskList from "@tiptap/extension-task-list";
    import TaskItem from "@tiptap/extension-task-item";
    import { TextStyle } from "@tiptap/extension-text-style";
    import Color from "@tiptap/extension-color";
    import Highlight from "@tiptap/extension-highlight";
    import Subscript from "@tiptap/extension-subscript";
    import Superscript from "@tiptap/extension-superscript";
    import Placeholder from "@tiptap/extension-placeholder";
    import DOMPurify from "https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.es.js";

    /* ---------- Custom Right Blockquote Extension ---------- */
    const RightBlockquote = Extension.create({
      name: 'rightBlockquote',
      addGlobalAttributes() {
        return [
          {
            types: ['blockquote'],
            attributes: {
              'data-type': {
                default: 'left',
                renderHTML: attributes => {
                  if (attributes['data-type']) {
                    return { 'data-type': attributes['data-type'] };
                  }
                  return {};
                },
                parseHTML: element => element.getAttribute('data-type') || 'left',
              },
            },
          },
        ];
      },
      addCommands() {
        return {
          setRightBlockquote: () => ({ commands }) => {
            return commands.wrapIn('blockquote', { 'data-type': 'right' });
          },
          toggleRightBlockquote: () => ({ commands }) => {
            return commands.toggleWrap('blockquote', { 'data-type': 'right' });
          },
          setLeftBlockquote: () => ({ commands }) => {
            return commands.wrapIn('blockquote', { 'data-type': 'left' });
          },
          toggleLeftBlockquote: () => ({ commands }) => {
            return commands.toggleWrap('blockquote', { 'data-type': 'left' });
          },
        };
      },
    });

    /* ---------- TextStyle'a global font attrs ekle ---------- */
    const FontAttrs = Extension.create({
      name: 'fontAttrs',
      addGlobalAttributes() {
        return [
          {
            types: ['textStyle'],
            attributes: {
              fontSize: {
                default: null,
                renderHTML: attrs => attrs.fontSize ? { style: `font-size: ${attrs.fontSize}` } : {},
                parseHTML: element => element.style.fontSize || null,
              },
              fontFamily: {
                default: null,
                renderHTML: attrs => attrs.fontFamily ? { style: `font-family: ${attrs.fontFamily}` } : {},
                parseHTML: element => element.style.fontFamily || null,
              },
            },
          },
        ];
      },
    });

    /* ---------- Init Editor ---------- */
    let currentSize = 14;
    let currentFamily = 'sans-serif';

    const editor = new Editor({
      element: document.querySelector('#editor'),
      extensions: [
        StarterKit,
        TaskList,
        TaskItem.configure({ nested: true }),
        TextStyle,
        Color, // uses TextStyle
        Highlight.configure({ multicolor: true }), // bg color
        FontAttrs, // fontSize & fontFamily on textStyle
        Subscript,
        Superscript,
        Placeholder.configure({
          placeholder: 'Start writing your note...',
        }),
        RightBlockquote, // custom right blockquote
      ],
      content: '',
      editorProps: {
        attributes: {
          'data-placeholder': 'Start writing your note...',
        },
        handlePaste(view, event) {
          const html = event.clipboardData?.getData('text/html');
          const text = event.clipboardData?.getData('text/plain');
          if (!html && !text) { return false; }
          
          // Sadece paste event'ini yakala
          if (event.type !== 'paste') { return false; }

          event.preventDefault();

          if (html) {
            // Güvenli temizle, style'ı koru
            const clean = DOMPurify.sanitize(html, {
              ALLOWED_TAGS: ['p','b','strong','i','em','u','s','span','h1','h2','h3','h4','h5','h6','ul','ol','li','blockquote','br','div'],
              ALLOWED_ATTR: ['style'],
              KEEP_CONTENT: true,
            });

            // Basit normalize
            let normalized = clean
              .replace(/<b>/g, '<strong>').replace(/<\/b>/g, '</strong>')
              .replace(/<i>/g, '<em>').replace(/<\/i>/g, '</em>')
              .replace(/<u>/g, '<span style="text-decoration:underline">')
              .replace(/<\/u>/g, '</span>')
              .replace(/<s>/g, '<span style="text-decoration:line-through">')
              .replace(/<\/s>/g, '</span>');

            // divleri p'ye çevir (daha stabil parse)
            normalized = normalized.replace(/<div(\s|>)/gi, '<p$1').replace(/<\/div>/gi, '</p>');

            editor.commands.insertContent(normalized, { parseOptions: { preserveWhitespace: true } });
            return true;
          }

          if (text) {
            editor.commands.insertContent(text);
            return true;
          }

          return false;
        },
      },
    });

    /* ---------- Helpers ---------- */
    const $ = id => document.getElementById(id);
    const headingBtn = $('heading-btn');
    const listBtn = $('list-btn');
    const paletteBtn = $('palette-btn');
    const headingPopup = $('heading-popup');
    const blockquotePopup = $('blockquote-popup');
    const listPopup = $('list-popup');
    const palettePopup = $('palette-popup');
    const textPopup = $('text-popup');
    const bgPopup = $('bg-popup');

    function openPopup(p) { p.classList.remove('d-none'); p.classList.add('d-flex'); }
    function closePopup(p) { p.classList.add('d-none'); p.classList.remove('d-flex'); }
    function positionPopupAt(popup, rect) {
      popup.style.top = rect.bottom + window.scrollY + 'px';
      popup.style.left = rect.left + window.scrollX + 'px';
    }
    function closeAllPopups() {
      [headingPopup, blockquotePopup, listPopup, palettePopup, textPopup, bgPopup].forEach(closePopup);
    }

    /* ---------- Toolbar actions ---------- */
    $('bold-btn').onclick = () => { editor.chain().focus().toggleBold().run(); };
    $('italic-btn').onclick = () => { editor.chain().focus().toggleItalic().run(); };
    $('underline-btn').onclick = () => { editor.chain().focus().toggleUnderline().run(); };
    $('strike-btn').onclick = () => { editor.chain().focus().toggleStrike().run(); };
    $('subscript-btn').onclick = () => { editor.chain().focus().toggleSubscript().run(); };
    $('superscript-btn').onclick = () => { editor.chain().focus().toggleSuperscript().run(); };
    /* ---------- Blockquote popup ---------- */
    $('blockquote-btn').onclick = (e) => {
      e.stopPropagation();
      [headingPopup, listPopup, palettePopup, textPopup, bgPopup].forEach(closePopup);
      const isOpen = !blockquotePopup.classList.contains('d-none');
      if (isOpen) { closePopup(blockquotePopup); }
      else { positionPopupAt(blockquotePopup, $('blockquote-btn').getBoundingClientRect()); openPopup(blockquotePopup); }
    };
    $('codeblock-btn').onclick = () => { editor.chain().focus().toggleCodeBlock().run(); };
    $('hr-btn').onclick = () => { editor.chain().focus().setHorizontalRule().run(); };
    $('undo-btn').onclick = () => { editor.chain().focus().undo().run(); };
    $('redo-btn').onclick = () => { editor.chain().focus().redo().run(); };

    /* ---------- Font size ---------- */
    function applyFontSize(px) {
      editor.chain().focus().setMark('textStyle', { fontSize: `${px}px` }).run();
      $('font-size-label').textContent = `${px}px`;
      currentSize = px;
    }
    $('font-inc').onclick = () => { currentSize += 1; applyFontSize(currentSize); };
    $('font-dec').onclick = () => { if (currentSize > 8) { currentSize -= 1; applyFontSize(currentSize); } };

    /* ---------- Font family ---------- */
    $('font-family-select').onchange = (e) => {
      const family = e.target.value;
      editor.chain().focus().setMark('textStyle', { fontFamily: family }).run();
      currentFamily = family;
    };

    /* ---------- Selection sync (font size & family) ---------- */
    editor.on('selectionUpdate', () => {
      const { from, to } = editor.state.selection;
      let foundSize = null;
      let foundFamily = null;

      editor.state.doc.nodesBetween(from, to, node => {
        if (node.type && node.type.name === 'text' && node.marks) {
          const ts = node.marks.find(m => m.type.name === 'textStyle');
          if (ts) {
            if (ts.attrs.fontSize) { foundSize = ts.attrs.fontSize; }
            if (ts.attrs.fontFamily) { foundFamily = ts.attrs.fontFamily; }
          }
        }
      });

      if (!foundSize) { foundSize = '14px'; }
      currentSize = parseInt(foundSize, 10);
      $('font-size-label').textContent = foundSize;

      if (!foundFamily) { foundFamily = 'sans-serif'; }
      currentFamily = foundFamily;
      $('font-family-select').value = foundFamily;
    });

    /* ---------- Heading popup ---------- */
    headingBtn.onclick = (e) => {
      e.stopPropagation();
      [blockquotePopup, listPopup, palettePopup, textPopup, bgPopup].forEach(closePopup);
      const isOpen = !headingPopup.classList.contains('d-none');
      if (isOpen) { closePopup(headingPopup); }
      else { positionPopupAt(headingPopup, headingBtn.getBoundingClientRect()); openPopup(headingPopup); }
    };
    headingPopup.querySelectorAll('button').forEach(btn => {
      btn.onclick = () => {
        const level = parseInt(btn.dataset.level);
        editor.chain().focus().toggleHeading({ level }).run();
        closePopup(headingPopup);
      };
    });

    /* ---------- Blockquote popup buttons ---------- */
    blockquotePopup.querySelectorAll('button').forEach(btn => {
      btn.onclick = () => {
        const type = btn.dataset.type;
        console.log('type:' + type);
        if (type === 'left') {
          editor.chain().focus().toggleLeftBlockquote().run();
        } else if (type === 'right') {
          editor.chain().focus().toggleRightBlockquote().run();
        }
        closePopup(blockquotePopup);
      };
    });

    /* ---------- List popup ---------- */
    listBtn.onclick = (e) => {
      e.stopPropagation();
      [headingPopup, blockquotePopup, palettePopup, textPopup, bgPopup].forEach(closePopup);
      const isOpen = !listPopup.classList.contains('d-none');
      if (isOpen) { closePopup(listPopup); }
      else { positionPopupAt(listPopup, listBtn.getBoundingClientRect()); openPopup(listPopup); }
    };
    listPopup.querySelectorAll('button').forEach(btn => {
      btn.onclick = () => {
        const a = btn.dataset.action;
        if (a === 'bullet') { editor.chain().focus().toggleBulletList().run(); }
        if (a === 'ordered') { editor.chain().focus().toggleOrderedList().run(); }
        if (a === 'task') { editor.chain().focus().toggleTaskList().run(); }
        closePopup(listPopup);
      };
    });

    /* ---------- Palette selector ---------- */
    paletteBtn.onclick = (e) => {
      e.stopPropagation();
      [headingPopup, blockquotePopup, listPopup, textPopup, bgPopup].forEach(closePopup);
      const isOpen = !palettePopup.classList.contains('d-none');
      if (isOpen) { closePopup(palettePopup); }
      else { positionPopupAt(palettePopup, paletteBtn.getBoundingClientRect()); openPopup(palettePopup); }
    };

    const textBtn = $('textcolor-btn');
    const bgBtn = $('bgcolor-btn');

    textBtn.onclick = (e) => {
      e.stopPropagation();
      closePopup(palettePopup);
      positionPopupAt(textPopup, textBtn.getBoundingClientRect());
      openPopup(textPopup);
    };
    bgBtn.onclick = (e) => {
      e.stopPropagation();
      closePopup(palettePopup);
      positionPopupAt(bgPopup, bgBtn.getBoundingClientRect());
      openPopup(bgPopup);
    };

    // text colors
    textPopup.querySelectorAll('.swatch[data-color]').forEach(s => {
      s.onclick = () => {
        editor.chain().focus().setColor(s.dataset.color).run();
        closePopup(textPopup);
      };
    });
    $('text-clear').onclick = () => {
      editor.chain().focus().unsetColor().run();
      closePopup(textPopup);
    };

    // bg colors
    bgPopup.querySelectorAll('.swatch[data-color]').forEach(s => {
      s.onclick = () => {
        editor.chain().focus().setHighlight({ color: s.dataset.color }).run();
        closePopup(bgPopup);
      };
    });
    $('bg-clear').onclick = () => {
      editor.chain().focus().unsetHighlight().run();
      closePopup(bgPopup);
    };

    /* ---------- Kapanış davranışları ---------- */
    // Dışarı tıkla → kapat
    document.addEventListener('click', (e) => {
      [headingPopup, blockquotePopup, listPopup, palettePopup, textPopup, bgPopup].forEach(p => {
        if (!p.classList.contains('d-none') && !p.contains(e.target)) { closePopup(p); }
      });
    });
    // ESC → kapat
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeAllPopups(); }
    });

    /* ---------- Title navigation ---------- */
    $('note-title').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        editor.commands.focus();
      }
    });
  </script>
</body>
</html>
